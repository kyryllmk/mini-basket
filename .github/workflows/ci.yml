name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint if configured
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No lint script configured; skipping."
          fi

      - name: Run typecheck if configured
        shell: bash
        run: |
          if node -e "process.exit(require('./package.json').scripts?.typecheck ? 0 : 1)"; then
            npm run typecheck
          else
            echo "No typecheck script configured; skipping."
          fi

      - name: Build
        run: npm run build
